<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>膜力佳 Demo 編號說明</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="notice">MOLIJIA TAIWAN｜Demo Code</div>
<main class="page-main">
<section class="section-block">
<p class="kicker">DEMO CODE</p>
<h1>Demo 編號與詢價摘要</h1>
<p>這是 Demo 編號頁。目前可產生測試用 Demo 編號；詢價清單明細會在下一階段接入。</p>
<p><button class="btn dark" id="makeDemo" type="button">產生 Demo 編號</button> <button class="btn light" type="button">複製摘要</button></p>
<h2>Demo 編號格式</h2>
<p><strong>DEMO-五位數字</strong></p>
<h2>詢價摘要格式</h2>
<pre class="summary-card" id="demoResult">膜力佳 Demo 詢價摘要
Demo 編號：DEMO-12345

商品清單：
- 商品名稱 x 數量

備註：目前為前端測試資料，不會送出到後台。</pre>
<p><a class="btn light" href="./">回首頁</a></p>
</section>
</main>
<script>
document.getElementById('makeDemo').onclick=function(){
  var code='DEMO-'+Math.floor(10000+Math.random()*90000);
  document.getElementById('demoResult').textContent='膜力佳 Demo 詢價摘要\nDemo 編號：'+code+'\n\n商品清單：\n- 請先回首頁加入商品到詢價清單\n\n備註：目前為前端測試資料，不會送出到後台。';
};
</script>
</body>
</html>
